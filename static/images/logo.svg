<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" width="260" height="80">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff1c1"/>
      <stop offset="50%" style="stop-color:#d4af37"/>
      <stop offset="100%" style="stop-color:#996515"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f4cf6d"/>
      <stop offset="100%" style="stop-color:#d4af37"/>
    </linearGradient>
  </defs>

  <!-- ── EMBLEM CIRCLE LEFT ── -->
  <!-- Outer ring -->
  <circle cx="40" cy="40" r="36" fill="#012219" stroke="url(#g1)" stroke-width="1.5"/>
  <!-- Inner ring -->
  <circle cx="40" cy="40" r="30" fill="none" stroke="#d4af37" stroke-width="0.5" opacity="0.4"/>

  <!-- Cloche / serving dome -->
  <ellipse cx="40" cy="50" rx="16" ry="2.5" fill="url(#g1)" opacity="0.9"/>
  <path d="M24 50 Q24 34 40 32 Q56 34 56 50 Z" fill="url(#g2)" opacity="0.95"/>
  <!-- Cloche shine -->
  <path d="M29 44 Q32 38 40 37" fill="none" stroke="#fde68a" stroke-width="1" opacity="0.5" stroke-linecap="round"/>
  <!-- Cloche handle knob -->
  <ellipse cx="40" cy="32" rx="3.5" ry="2" fill="url(#g1)"/>
  <rect x="38.5" y="30" width="3" height="3" rx="1" fill="url(#g1)"/>

  <!-- Fork left of cloche -->
  <g transform="translate(22, 28)">
    <line x1="0" y1="0" x2="0" y2="18" stroke="#d4af37" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-2" y1="0" x2="-2" y2="7" stroke="#d4af37" stroke-width="1" stroke-linecap="round"/>
    <line x1="2" y1="0" x2="2" y2="7" stroke="#d4af37" stroke-width="1" stroke-linecap="round"/>
    <path d="M-2 7 Q0 10 2 7" fill="none" stroke="#d4af37" stroke-width="1"/>
  </g>

  <!-- Spoon right of cloche -->
  <g transform="translate(58, 28)">
    <line x1="0" y1="6" x2="0" y2="18" stroke="#d4af37" stroke-width="1.2" stroke-linecap="round"/>
    <ellipse cx="0" cy="3.5" rx="2.2" ry="3.5" fill="#d4af37" opacity="0.9"/>
  </g>

  <!-- Star top of emblem -->
  <polygon points="40,10 41.2,13.6 45,13.6 42,15.8 43.2,19.4 40,17.2 36.8,19.4 38,15.8 35,13.6 38.8,13.6" fill="#d4af37" opacity="0.9"/>

  <!-- Decorative dots around circle -->
  <circle cx="40" cy="6.5" r="1" fill="#d4af37" opacity="0.5"/>
  <circle cx="40" cy="73.5" r="1" fill="#d4af37" opacity="0.5"/>
  <circle cx="6.5" cy="40" r="1" fill="#d4af37" opacity="0.5"/>
  <circle cx="73.5" cy="40" r="1" fill="#d4af37" opacity="0.5"/>

  <!-- ── TEXT SECTION RIGHT ── -->
  <!-- AMPM -->
  <text x="90" y="36" font-family="Georgia,'Times New Roman',serif" font-size="28" font-weight="700" fill="url(#g1)" letter-spacing="8" dominant-baseline="middle">AMPM</text>

  <!-- Gold rule under AMPM -->
  <line x1="90" y1="47" x2="252" y2="47" stroke="url(#g1)" stroke-width="0.6" opacity="0.6"/>

  <!-- Subtitle -->
  <text x="90" y="60" font-family="Georgia,serif" font-size="7" fill="#d4af37" letter-spacing="2.5" opacity="0.8" dominant-baseline="middle">EVENT MANAGEMENT &amp; CATERING</text>

  <!-- Small dot separators in subtitle area -->
  <circle cx="168" cy="70" r="1" fill="#d4af37" opacity="0.4"/>
  <line x1="90" y1="70" x2="160" y2="70" stroke="#d4af37" stroke-width="0.4" opacity="0.3"/>
  <line x1="176" y1="70" x2="252" y2="70" stroke="#d4af37" stroke-width="0.4" opacity="0.3"/>
  <text x="168" y="70" font-family="Georgia,serif" font-size="6.5" fill="#d4af37" opacity="0.5" text-anchor="middle" dominant-baseline="middle">✦</text>
</svg>
